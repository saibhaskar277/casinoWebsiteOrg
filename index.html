<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quills Studios — The Journey to Treasure Island</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky-top:#8FE0FF;
  --sea-mid:#17ADC2;
  --sand:#F5D68B;
  --sand-dark:#DDA84E;
  --wood-dark:#6B4522;
  --gold:#F2A93B;
  --coral:#FF6B4A;
  --ink:#0E2F42;
  --cream:#FFF7E6;
  --panel-bg:#FFFBF0;
  --shadow: 0 12px 30px rgba(14,47,66,.25);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Nunito', sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:#6ec8ff;
  --panel-width:clamp(320px, 32vw, 480px);
}

/* ---------- BOOT LOADER ---------- */
.boot-loader{
  position:fixed; inset:0;
  z-index:10000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  background:
    radial-gradient(ellipse 80% 55% at 50% 35%, #b8e8ff 0%, transparent 70%),
    linear-gradient(180deg, #6ec8ff 0%, #8fd4ef 42%, #ffe49e 100%);
  transition:opacity .55s ease, visibility .55s ease;
}
.boot-loader .boot-brand{
  font-family:'Fraunces', serif;
  font-weight:900;
  font-size:clamp(28px, 5vw, 42px);
  letter-spacing:.04em;
  color:var(--ink);
  text-align:center;
  line-height:1;
}
.boot-loader .boot-brand span{
  display:block;
  margin-top:8px;
  font-family:'Nunito', sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.28em;
  color:var(--wood-dark);
}
.boot-loader .boot-status{
  font-size:13px;
  font-weight:700;
  color:rgba(14,47,66,.72);
  min-height:1.2em;
}
.boot-bar{
  width:min(220px, 56vw);
  height:6px;
  border-radius:999px;
  background:rgba(14,47,66,.12);
  overflow:hidden;
}
.boot-bar-fill{
  height:100%;
  width:0%;
  border-radius:inherit;
  background:linear-gradient(90deg, var(--sand-dark), var(--coral));
  transition:width .2s ease;
}
.boot-pct{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:.06em;
}
body.is-loading .stage,
body.is-loading .overlay,
body.is-loading .panel{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
body.is-ready .boot-loader{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
body.is-ready .stage{
  opacity:1;
  visibility:visible;
  transition:opacity .55s ease;
}

.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(180deg, #6ec8ff 0%, #b8e8ff 45%, #ffe49e 62%, #17adc2 68%, #0c7f98 100%);
}

#island-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  display:block;
  pointer-events:none;
}

.ui-layer{
  position:absolute;
  inset:0;
  z-index:20;
  pointer-events:none;
}
.ui-layer .hotspot,
.ui-layer .topbar,
.ui-layer .contact-btn,
.ui-layer a,
.ui-layer button{
  pointer-events:auto;
}

/* ---------- TOP BAR (assets/ui/layout.json → topbar) ---------- */
.topbar{
  position:absolute;
  top:0; left:0; right:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:var(--topbar-pad-y, 18px) var(--topbar-pad-x, 26px);
  pointer-events:none;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}
.logo .quill{
  font-size:var(--topbar-quill, 26px);
  transform:rotate(-15deg);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
}
.logo-text{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:var(--topbar-logo, 19px);
  color:var(--cream);
  letter-spacing:.3px;
  text-shadow:0 2px 8px rgba(14,47,66,.55);
  line-height:1.1;
}
.logo-text span{
  display:block;
  font-family:'Nunito',sans-serif;
  font-weight:700;
  font-size:var(--topbar-logo-sub, 10px);
  letter-spacing:2.5px;
  color:var(--gold);
  text-shadow:none;
}
.contact-bar{
  display:flex;
  gap:10px;
  pointer-events:auto;
}
.contact-btn{
  display:flex;
  align-items:center;
  gap:7px;
  background:rgba(14,47,66,.55);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.25);
  color:var(--cream);
  padding:var(--topbar-btn-pad-y, 9px) var(--topbar-btn-pad-x, 14px);
  border-radius:999px;
  font-weight:700;
  font-size:var(--topbar-btn-font, 13px);
  text-decoration:none;
  transition:transform .15s ease, background .15s ease;
}
.contact-btn:hover{
  background:var(--coral);
  transform:translateY(-2px);
}
.contact-btn .ic{font-size:15px;}
@media(max-width:640px){
  .contact-btn span.label{display:none;}
  .contact-btn{padding:9px 11px;}
}

/* ---------- HERO TITLE (driven by assets/ui/layout.json → title) ---------- */
/* Board PNG sized by layout; box uses aspect-ratio from config. */
.hero-copy{
  position:absolute;
  top:var(--title-top, 2.2%);
  left:var(--title-left, 50%);
  transform:translateX(-50%);
  text-align:center;
  z-index:20;
  width:var(--title-width, 39.6%);
  aspect-ratio:var(--title-ratio, 780 / 228);
  height:auto;
  padding:var(--title-pad-top, 4%) var(--title-pad-x, 12%) var(--title-pad-bottom, 4%);
  background:url('assets/ui/title-board.png') center center / 100% 100% no-repeat;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--title-gap, 3px);
  box-sizing:border-box;
  overflow:hidden;
}
.hero-eyebrow{
  font-family:'Nunito',sans-serif;
  font-weight:800;
  font-size:clamp(var(--title-eyebrow-min, 8px), var(--title-eyebrow-vw, 0.72vw), var(--title-eyebrow-max, 11px));
  letter-spacing:var(--title-eyebrow-tracking, 1.5px);
  text-transform:uppercase;
  color:rgba(255,247,230,.95);
  background:transparent;
  display:block;
  padding:0;
  margin:0;
  text-shadow:0 2px 6px rgba(14,47,66,.55);
  max-width:100%;
  line-height:1.2;
  white-space:nowrap;
  transform:translateX(var(--title-eyebrow-offset-x, -40px));
}
.hero-title{
  font-family:'Fraunces', serif;
  font-weight:900;
  font-size:clamp(var(--title-headline-min, 13px), var(--title-headline-vw, 1.35vw), var(--title-headline-max, 22px));
  color:var(--cream);
  text-shadow:0 2px 0 rgba(107,69,34,.45), 0 6px 12px rgba(14,47,66,.35);
  line-height:1.12;
  max-width:100%;
  margin:0;
  text-wrap:balance;
  white-space:normal;
}
.hero-sub{ display:none; }

/* ---------- HOTSPOTS (ui number + text boards) ---------- */
/* Layout matches reference: circle medallion on the LEFT, text board BEHIND it
   extending to the right. Hotspot is positioned by its circle center (x,y). */
.hotspot{
  position:absolute;
  z-index:25;
  background:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  /* transform set inline (translate -50%,-50%) — origin is the circle center */
  will-change:left, top;
}
.hotspot-inner{
  position:relative;
  display:inline-block;
  animation:bob 4.5s ease-in-out infinite;
}
.hotspot .isle{
  position:relative;
  z-index:2;
  /* Size from layout.json → numberBoard × per-hotspot --spot-nb-scale */
  width:calc(clamp(var(--nb-min, 56px), var(--nb-vw, 6.5vw), var(--nb-max, 84px)) * var(--spot-nb-scale, 1));
  aspect-ratio:var(--nb-ratio, 253 / 250);
  height:auto;
  border-radius:0;
  background-color:transparent;
  background-position:center;
  background-size:contain;
  background-repeat:no-repeat;
  border:none;
  box-shadow:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0;
  color:transparent;
  backdrop-filter:none;
  transition:transform .2s ease;
  flex-shrink:0;
  filter:drop-shadow(0 4px 8px rgba(14,47,66,.35));
}
.hotspot[data-spot="1"] .isle{ background-image:url('assets/ui/number-board-1.png'); }
.hotspot[data-spot="2"] .isle{ background-image:url('assets/ui/number-board-5.png'); }
.hotspot[data-spot="3"] .isle{ background-image:url('assets/ui/number-board-4.png'); }
.hotspot[data-spot="4"] .isle{ background-image:url('assets/ui/number-board-2.png'); }
.hotspot[data-spot="5"] .isle{ background-image:url('assets/ui/number-board-3.png'); }
.hotspot:hover .isle, .hotspot:focus-visible .isle{
  transform:scale(1.08) translateY(-2px);
  box-shadow:none;
}
.hotspot .badge{
  position:absolute;
  inset:0;
  width:auto; height:auto;
  border-radius:0;
  background:transparent;
  color:var(--cream);
  font-family:'JetBrains Mono', monospace;
  font-weight:700;
  font-size:clamp(var(--nb-badge-min, 11px), var(--nb-badge-vw, 1.25vw), var(--nb-badge-max, 17px));
  display:flex; align-items:center; justify-content:center;
  border:none;
  box-shadow:none;
  text-shadow:0 2px 4px rgba(0,0,0,.45);
  pointer-events:none;
  top:0; left:0;
}
.hotspot .tag{
  /* Text board sits BEHIND the circle, offset right + half-down so the
     circle overlaps its top-left (board top ~ mid-circle). */
  position:absolute;
  top:50%;
  left:50%;
  z-index:1;
  transform:translate(-14%, 0);
  /* Size from layout.json → textBoard × per-hotspot --spot-tb-scale */
  width:calc(clamp(var(--tb-min, 120px), var(--tb-vw, 15vw), var(--tb-max, 190px)) * var(--spot-tb-scale, 1));
  aspect-ratio:var(--tb-ratio, 520 / 250);
  height:auto;
  background:url('assets/ui/text-board.png') center / contain no-repeat;
  color:var(--wood-dark);
  font-weight:800;
  font-size:calc(clamp(var(--tb-font-min, 9px), var(--tb-font-vw, 0.95vw), var(--tb-font-max, 12.5px)) * var(--spot-tb-scale, 1));
  line-height:1.15;
  /* extra left padding clears the overlapping circle */
  padding:var(--tb-pad-top, 16%) var(--tb-pad-x, 10%) var(--tb-pad-bottom, 16%) var(--tb-pad-left, 26%);
  border-radius:0;
  box-shadow:none;
  text-align:center;
  max-width:none;
  border:none;
  border-bottom:none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}
@keyframes bob{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-8px);}
}

.route{
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
}

.footer-tag{
  position:absolute;
  bottom:var(--footer-bottom, 20px); left:50%; transform:translateX(-50%);
  z-index:22;
  text-align:center;
  color:var(--cream);
  font-weight:700;
  font-size:var(--footer-font, 12.5px);
  line-height:1.35;
  text-shadow:0 2px 8px rgba(14,47,66,.6);
  width:min(var(--footer-max-px, 560px), var(--footer-max-vw, 90vw));
  padding:0 12px;
  box-sizing:border-box;
  pointer-events:none;
}

/* ---------- SLIDE PANEL (overlays homepage — does not resize the stage) ---------- */
.overlay{
  position:fixed; inset:0;
  background:rgba(14,47,66,.22);
  backdrop-filter:blur(1px);
  opacity:0; pointer-events:none;
  transition:opacity .38s cubic-bezier(.22,.9,.32,1);
  z-index:80;
}
.overlay.open{ opacity:1; pointer-events:auto; }

body.panel-open .stage{
  width:100vw !important;
  height:100vh !important;
}

.panel{
  position:fixed;
  top:0; right:0;
  width:var(--panel-width);
  height:100vh;
  background:var(--panel-bg);
  box-shadow:-14px 0 40px rgba(14,47,66,.35);
  transform:translateX(100%);
  transition:transform .38s cubic-bezier(.22,.9,.32,1);
  z-index:90;
  overflow-y:auto;
  padding:26px 24px 60px;
}
.panel.open{ transform:translateX(0); }
.panel::-webkit-scrollbar{width:8px;}
.panel::-webkit-scrollbar-thumb{background:var(--sand-dark); border-radius:8px;}

.panel-close{
  position:absolute;
  top:18px; right:18px;
  width:34px; height:34px;
  border-radius:50%;
  border:none;
  background:var(--ink);
  color:var(--cream);
  font-size:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.panel-close:hover{ background:var(--coral); }

.panel-eyebrow{
  display:flex; align-items:center; gap:10px;
  margin-bottom:6px;
}
.panel-eyebrow .num{
  width:30px; height:30px;
  border-radius:50%;
  background:var(--coral);
  color:#fff;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:12px;
  display:flex; align-items:center; justify-content:center;
}
.panel-eyebrow .cat{
  font-weight:800;
  font-size:11px;
  letter-spacing:2px;
  color:var(--wood-dark);
  text-transform:uppercase;
}
.panel h2{
  font-family:'Fraunces', serif;
  font-weight:800;
  font-size:26px;
  color:var(--ink);
  margin:2px 0 12px;
  padding-right:30px;
}
.panel p.lead{
  font-size:14.5px;
  line-height:1.6;
  color:#3B5A6B;
  margin-bottom:22px;
}
.section-label{
  font-weight:800;
  font-size:11px;
  letter-spacing:1.6px;
  text-transform:uppercase;
  color:var(--wood-dark);
  margin:22px 0 10px;
  border-bottom:2px dashed var(--sand-dark);
  padding-bottom:6px;
}
.chip-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.chip{
  background:#fff;
  border:1px solid #EFDFB8;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  font-size:11.5px;
  font-weight:700;
  color:var(--ink);
}
.chip .ic{ font-size:22px; display:block; margin-bottom:4px;}

.game-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
}
.game-card{
  background:linear-gradient(160deg, var(--ink), #1C4A63);
  border-radius:14px;
  padding:16px 10px;
  text-align:center;
  color:var(--cream);
  box-shadow:var(--shadow);
}
.game-card .ic{ font-size:30px; }
.game-card .name{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:13px;
  margin-top:8px;
  line-height:1.2;
}

.stat-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.stat-card{
  background:var(--sand);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}
.stat-card .label{
  font-size:9.5px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--wood-dark);
  text-transform:uppercase;
}
.stat-card .val{
  font-family:'JetBrains Mono', monospace;
  font-weight:700;
  font-size:14px;
  color:var(--ink);
  margin-top:4px;
}

.check-list{ list-style:none; margin-top:10px;}
.check-list li{
  font-size:13.5px;
  padding:6px 0 6px 26px;
  position:relative;
  color:#3B5A6B;
}
.check-list li::before{
  content:'✓';
  position:absolute; left:0; top:5px;
  width:18px; height:18px;
  background:var(--sea-mid);
  color:#fff;
  border-radius:50%;
  font-size:11px;
  display:flex; align-items:center; justify-content:center;
}

.team-card{
  display:flex; align-items:center; gap:14px;
  background:#fff;
  border:1px solid #EFDFB8;
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:10px;
}
.team-avatar{
  width:52px; height:52px;
  border-radius:50%;
  background:linear-gradient(160deg, var(--gold), var(--coral));
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  color:#fff;
  flex-shrink:0;
}
.team-name{ font-family:'Fraunces', serif; font-weight:700; font-size:15px;}
.team-role{ font-size:12px; color:#6B879A; font-weight:700;}

.cta-btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  width:100%;
  background:var(--coral);
  color:#fff;
  font-weight:800;
  font-size:14px;
  padding:13px 18px;
  border-radius:999px;
  text-decoration:none;
  margin-top:18px;
  box-shadow:0 8px 18px rgba(255,107,74,.4);
  transition:transform .15s ease;
}
.cta-btn:hover{ transform:translateY(-2px); }

.portfolio-row{
  display:flex; gap:10px; overflow-x:auto; padding-bottom:6px;
}
.portfolio-card{
  min-width:120px;
  background:#fff;
  border:1px solid #EFDFB8;
  border-radius:12px;
  padding:12px;
  text-align:center;
  flex-shrink:0;
}
.portfolio-card .ic{ font-size:24px;}
.portfolio-card .name{ font-size:11.5px; font-weight:800; margin-top:6px;}

@media(max-width:760px){
  body{ --panel-width:100vw; }
  .overlay{
    background:rgba(14,47,66,.2);
  }

  /* Keep hero board readable and inside the screen. */
  .hero-copy{
    width:min(var(--title-width, 84%), 90vw) !important;
    max-width:90vw;
  }
  .hero-eyebrow{
    white-space:normal;
    letter-spacing:0.5px;
    transform:translateX(var(--title-eyebrow-offset-x, -8px));
    font-size:clamp(6px, 2vw, var(--title-eyebrow-max, 7.5px));
  }
  .hero-title{
    font-size:clamp(11px, 3.8vw, var(--title-headline-max, 14px));
    line-height:1.08;
  }

  /* Compact chrome so art + hotspots stay visible. */
  .topbar{
    padding:var(--topbar-pad-y, 8px) var(--topbar-pad-x, 10px);
  }
  .footer-tag{
    font-size:var(--footer-font, 9.5px);
    bottom:var(--footer-bottom, 8px);
    width:min(var(--footer-max-px, 560px), var(--footer-max-vw, 94vw));
  }

  /* Right-edge hotspots open their text boards left so they stay on-screen. */
  .hotspot[data-spot="2"] .tag,
  .hotspot[data-spot="5"] .tag{
    left:auto;
    right:50%;
    transform:translate(14%, 0);
    padding:var(--tb-pad-top, 16%) var(--tb-pad-left, 26%) var(--tb-pad-bottom, 16%) var(--tb-pad-x, 10%);
  }

  /* Section 1–5 labels — readable like title type. */
  .hotspot .isle{
    width:clamp(44px, 12vw, 62px) !important;
  }
  .hotspot .tag{
    width:clamp(118px, 34vw, 168px) !important;
    font-size:clamp(11px, 3.5vw, 14px) !important;
    line-height:1.12;
    font-weight:800;
    letter-spacing:0.2px;
  }
  .hotspot .badge{
    font-size:clamp(11px, 3.2vw, 15px) !important;
  }

  @keyframes bob{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-4px);}
  }
}

@media (prefers-reduced-motion: reduce){
  .hotspot-inner{ animation:none !important; }
}
</style>
</head>
<body class="is-loading">

<div class="boot-loader" id="boot-loader" role="status" aria-live="polite" aria-busy="true">
  <div class="boot-brand">QUILLS<span>GAME STUDIOS</span></div>
  <div class="boot-status" id="boot-status">Charting the island…</div>
  <div class="boot-bar" aria-hidden="true"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
  <div class="boot-pct" id="boot-pct">0%</div>
</div>

<div class="stage" id="stage">
  <canvas id="island-canvas" aria-hidden="true"></canvas>

  <div class="ui-layer">
    <div class="topbar">
      <div class="logo">
        <span class="quill">🪶</span>
        <div class="logo-text">QUILLS<span>GAME STUDIOS</span></div>
      </div>
      <div class="contact-bar">
        <a class="contact-btn" href="mailto:hello@quillsstudios.com"><span class="ic">✉️</span><span class="label">Contact Us</span></a>
        <a class="contact-btn" href="tel:+919886012345"><span class="ic">📞</span><span class="label">+91 98860 12345</span></a>
      </div>
    </div>

    <div class="hero-copy">
      <span class="hero-eyebrow">CRAFTING IMMERSIVE GAMES · DELIVERING REAL VALUE</span>

const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const panelContent = document.getElementById('panel-content');

function openPanel(id){
  const c = content[id];
  panelContent.innerHTML = `
    <div class="panel-eyebrow"><div class="num">0${id}</div><div class="cat">${c.cat}</div></div>
    <h2>${c.title}</h2>
    <p class="lead">${c.lead}</p>
    ${c.body}
  `;
  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.classList.add('panel-open');
}
function closePanel(){
  panel.classList.remove('open');
  overlay.classList.remove('open');
  document.body.classList.remove('panel-open');
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePanel(); });

/** Apply ALL UI chrome from assets/ui/layout.json — CSS no longer hardcodes sizes. */
(async function applyUiLayout(){
  try{
    const res = await fetch('assets/ui/layout.json?v=20260715ai');
    if(!res.ok) return;
    const cfg = await res.json();
    const artW = cfg.uiArtWidth || 1920;
    const artH = cfg.uiArtHeight || 1080;
    const root = document.documentElement;

    const top = cfg.topbar || {};
    const mob = cfg.mobile || {};
    const isMobile = window.matchMedia(`(max-width: ${mob.maxWidthPx || 760}px)`).matches;

    root.style.setProperty('--topbar-pad-y', `${isMobile ? (mob.topbarPadY ?? 10) : (top.paddingY ?? 18)}px`);
    root.style.setProperty('--topbar-pad-x', `${isMobile ? (mob.topbarPadX ?? 12) : (top.paddingX ?? 26)}px`);
    root.style.setProperty('--topbar-logo', `${isMobile ? (mob.logoFontPx ?? 15) : (top.logoFontPx ?? 19)}px`);
    root.style.setProperty('--topbar-logo-sub', `${isMobile ? (mob.logoSubPx ?? 8) : (top.logoSubPx ?? 10)}px`);
    root.style.setProperty('--topbar-quill', `${isMobile ? (mob.quillPx ?? 20) : (top.quillPx ?? 26)}px`);
    root.style.setProperty('--topbar-btn-font', `${top.btnFontPx ?? 13}px`);
    root.style.setProperty('--topbar-btn-pad-y', `${top.btnPadY ?? 9}px`);
    root.style.setProperty('--topbar-btn-pad-x', `${top.btnPadX ?? 14}px`);

    const t = cfg.title || {};
    let scale = t.scale == null ? 1 : Number(t.scale);
    if (isMobile) scale *= mob.titleScale == null ? 0.9 : Number(mob.titleScale);
    const tw = (t.w || 800) * scale;
    // Visible wood height; prefer explicit h from layout.
    const th = t.h || 230;
    const tArtW = t.w || 800;
    const cx = (t.x || 0) + tArtW / 2;
    // CSS % padding is width-based; convert vertical pads from % of board height.
    const titleHOverW = th / tArtW;
    const padTopW = (t.paddingTopPct ?? 14) * titleHOverW;
    const padBottomW = (t.paddingBottomPct ?? 16) * titleHOverW;
    const titleWidthPct = isMobile
      ? (mob.titleWidthPct == null ? 88 : Number(mob.titleWidthPct))
      : (tw / artW) * 100;
    root.style.setProperty('--title-top', `${((t.y || 0) / artH) * 100}%`);
    root.style.setProperty('--title-left', `${(cx / artW) * 100}%`);
    root.style.setProperty('--title-width', `${titleWidthPct}%`);
    root.style.setProperty('--title-ratio', `${tArtW} / ${th}`);
    root.style.setProperty('--title-pad-top', `${padTopW}%`);
    root.style.setProperty('--title-pad-x', `${t.paddingXPct ?? 11}%`);
    root.style.setProperty('--title-pad-bottom', `${padBottomW}%`);
    root.style.setProperty('--title-gap', `${t.gapPx ?? 3}px`);
    if (t.file) {
      const titleEl = document.querySelector('.hero-copy');
      if (titleEl) {
        const titleUrl = t.file.startsWith('assets/') ? t.file : `assets/ui/${t.file}`;
        titleEl.style.backgroundImage = `url('${titleUrl.replace(/ /g, '%20')}')`;
      }
    }
    const eyebrow = t.eyebrow || {};
    const headline = t.headline || {};
    const eyebrowOffset = isMobile
      ? (mob.eyebrowOffsetX == null ? -10 : Number(mob.eyebrowOffsetX))
      : (eyebrow.offsetX ?? -40);
    root.style.setProperty('--title-eyebrow-min', `${eyebrow.minPx ?? 8}px`);
    root.style.setProperty('--title-eyebrow-vw', `${eyebrow.vw ?? 0.72}vw`);
    root.style.setProperty('--title-eyebrow-max', `${isMobile ? (mob.eyebrowMaxPx ?? 8) : (eyebrow.maxPx ?? 11)}px`);
    root.style.setProperty('--title-eyebrow-tracking', `${isMobile ? 0.6 : (eyebrow.letterSpacingPx ?? 1.5)}px`);
    root.style.setProperty('--title-eyebrow-offset-x', `${eyebrowOffset}px`);
    root.style.setProperty('--title-headline-min', `${headline.minPx ?? 13}px`);
    root.style.setProperty('--title-headline-vw', `${headline.vw ?? 1.35}vw`);
    root.style.setProperty('--title-headline-max', `${isMobile ? (mob.headlineMaxPx ?? 16) : (headline.maxPx ?? 22)}px`);

    let nScale = (cfg.numberBoard && cfg.numberBoard.scale != null) ? Number(cfg.numberBoard.scale) : 1;
    let tScale = (cfg.textBoard && cfg.textBoard.scale != null) ? Number(cfg.textBoard.scale) : 1;
    let textFontScale = tScale;
    let badgeFontScale = nScale;
    if (isMobile) {
      nScale *= mob.numberBoardScale == null ? 0.78 : Number(mob.numberBoardScale);
      tScale *= mob.textBoardScale == null ? 0.82 : Number(mob.textBoardScale);
      // Keep label type readable (near title size) — do not crush fonts with board scale.
      textFontScale = mob.textFontScale == null ? 1.15 : Number(mob.textFontScale);
      badgeFontScale = mob.badgeFontScale == null ? 1.1 : Number(mob.badgeFontScale);
    }

    const nb = cfg.numberBoard || {};
    root.style.setProperty('--nb-ratio', `${nb.w || 253} / ${nb.h || 250}`);
    root.style.setProperty('--nb-min', `${(nb.minPx ?? 56) * nScale}px`);
    root.style.setProperty('--nb-vw', `${(nb.widthVw ?? 6.5) * nScale}vw`);
    root.style.setProperty('--nb-max', `${(nb.maxPx ?? 84) * nScale}px`);
    root.style.setProperty('--nb-badge-min', `${(nb.badgeMinPx ?? 11) * badgeFontScale}px`);
    root.style.setProperty('--nb-badge-vw', `${(nb.badgeVw ?? 1.25) * badgeFontScale}vw`);
    root.style.setProperty('--nb-badge-max', `${(nb.badgeMaxPx ?? 17) * badgeFontScale}px`);

    const tb = cfg.textBoard || {};
    root.style.setProperty('--tb-ratio', `${tb.w || 520} / ${tb.h || 250}`);
    root.style.setProperty('--tb-min', `${(tb.minPx ?? 120) * tScale}px`);
    root.style.setProperty('--tb-vw', `${(tb.widthVw ?? 15) * tScale}vw`);
    root.style.setProperty('--tb-max', `${(tb.maxPx ?? 190) * tScale}px`);
    root.style.setProperty('--tb-font-min', `${(tb.fontMinPx ?? 9) * textFontScale}px`);
    root.style.setProperty('--tb-font-vw', `${isMobile ? 3.4 : ((tb.fontVw ?? 0.95) * textFontScale)}vw`);
    root.style.setProperty('--tb-font-max', `${(tb.fontMaxPx ?? 12.5) * textFontScale}px`);
    root.style.setProperty('--tb-pad-top', `${tb.padTopPct ?? 16}%`);
    root.style.setProperty('--tb-pad-x', `${tb.padXPct ?? 10}%`);
    root.style.setProperty('--tb-pad-left', `${tb.padLeftPct ?? 26}%`);
    root.style.setProperty('--tb-pad-bottom', `${tb.padBottomPct ?? 12}%`);

    const spots = cfg.hotspots || {};
    Object.keys(spots).forEach((id) => {
      const el = document.querySelector(`.hotspot[data-spot="${id}"]`);
      if (!el) return;
      const h = spots[id];
      el.style.setProperty('--spot-nb-scale', String(h.numberScale == null ? 1 : h.numberScale));
      el.style.setProperty('--spot-tb-scale', String(h.textScale == null ? 1 : h.textScale));
    });

    const foot = cfg.footer || {};
    root.style.setProperty('--footer-bottom', `${isMobile ? (mob.footerBottomPx ?? 10) : (foot.bottomPx ?? 14)}px`);
    root.style.setProperty('--footer-font', `${isMobile ? (mob.footerFontPx ?? 10) : (foot.fontPx ?? 12.5)}px`);
    root.style.setProperty('--footer-max-px', `${foot.maxWidthPx ?? 420}px`);
    root.style.setProperty('--footer-max-vw', `${isMobile ? (mob.footerMaxVw ?? 94) : (foot.maxWidthVw ?? 86)}vw`);
  }catch(err){
    console.warn('ui layout config failed', err);
  }
})();
</script>
