<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="site-rev" content="__DEPLOY_REV__">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Quills Studios — The Journey to Treasure Island</title>
<script>
/* Bust JS/CSS asset URLs on localhost / ?nocache= so edits always load. */
window.__ASSET_BUST__ = (function () {
  const rev = document.querySelector('meta[name="site-rev"]')?.content || '';
  const host = location.hostname;
  const local = host === 'localhost' || host === '127.0.0.1' || host === '[::1]';
  if (local || !rev || rev.includes('DEPLOY_REV') || /(?:\?|&)nocache=/.test(location.search)) {
    return String(Date.now()) + '-' + Math.random().toString(36).slice(2, 8);
  }
  return rev;
})();
/* Orientation class only — layout size stays on the layout viewport.
   Pinch-zoom must NOT rewrite --stage-h or everything reflows. */
(function syncOrientEarly() {
  function isZoomed() {
    const vv = window.visualViewport;
    return !!(vv && Math.abs(vv.scale - 1) > 0.02);
  }

  function apply() {
    // Browser zoom: leave CSS size alone so positions stay fixed (visual scale only).
    if (isZoomed()) return;

    const w = window.innerWidth;
    const h = window.innerHeight;
    const portrait = Math.abs(w - h) < 12
      ? window.matchMedia('(orientation: portrait)').matches
      : h > w;
    const root = document.documentElement;
    root.classList.toggle('layout-portrait', portrait);
    root.classList.toggle('layout-landscape', !portrait);
    // Layout viewport only (not visualViewport) — zoom won't change these.
    root.style.setProperty('--stage-w', `${Math.round(w)}px`);
    root.style.setProperty('--stage-h', `${Math.round(h)}px`);
  }

  apply();
  window.addEventListener('resize', apply);
  window.addEventListener('orientationchange', () => setTimeout(apply, 50));
  // visualViewport.resize fires on pinch-zoom AND chrome show/hide — skip when zoomed.
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', apply);
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --sky-top:#8FE0FF;
  --sea-mid:#17ADC2;
  --sand:#F5D68B;
  --sand-dark:#DDA84E;
  --wood-dark:#6B4522;
  --gold:#F2A93B;
  --coral:#FF6B4A;
  --ink:#0E2F42;
  --cream:#FFF7E6;
  --panel-bg:#FFFBF0;
  --shadow: 0 12px 30px rgba(14,47,66,.25);
  --title-img: url('assets/ui/Title%20with%20board.png');
  --panel-width:clamp(480px, 48vw, 720px);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{
  width:100%;
  height:100%;
  height:100dvh;
  overflow:hidden;
  position:relative;
}
body{
  font-family:'Nunito', sans-serif;
  color:var(--ink);
  overflow:hidden;
  background:#6ec8ff;
}

/* ---------- BOOT LOADER ---------- */
.boot-loader{
  position:fixed; inset:0;
  z-index:10000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  background:
    radial-gradient(ellipse 80% 55% at 50% 35%, #b8e8ff 0%, transparent 70%),
    linear-gradient(180deg, #6ec8ff 0%, #8fd4ef 42%, #ffe49e 100%);
  transition:opacity .55s ease, visibility .55s ease;
}
.boot-loader .boot-brand{
  font-family:'Fraunces', serif;
  font-weight:900;
  font-size:clamp(28px, 5vw, 42px);
  letter-spacing:.04em;
  color:var(--ink);
  text-align:center;
  line-height:1;
}
.boot-loader .boot-brand span{
  display:block;
  margin-top:8px;
  font-family:'Nunito', sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.28em;
  color:var(--wood-dark);
}
.boot-loader .boot-status{
  font-size:13px;
  font-weight:700;
  color:rgba(14,47,66,.72);
  min-height:1.2em;
}
.boot-bar{
  width:min(220px, 56vw);
  height:6px;
  border-radius:999px;
  background:rgba(14,47,66,.12);
  overflow:hidden;
}
.boot-bar-fill{
  height:100%;
  width:0%;
  border-radius:inherit;
  background:linear-gradient(90deg, var(--sand-dark), var(--coral));
  transition:width .2s ease;
}
.boot-pct{
  font-family:'JetBrains Mono', monospace;
  font-size:12px;
  font-weight:700;
  color:var(--ink);
  letter-spacing:.06em;
}
body.is-loading .stage,
body.is-loading .overlay,
body.is-loading .panel{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
body.is-ready .boot-loader{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
body.is-ready .stage{
  opacity:1;
  visibility:visible;
  transition:opacity .55s ease;
}

.stage{
  position:relative;
  width:100%;
  height:100%;
  height:var(--stage-h, 100dvh);
  overflow:hidden;
  background:linear-gradient(180deg, #6ec8ff 0%, #b8e8ff 45%, #ffe49e 62%, #17adc2 68%, #0c7f98 100%);
}

#island-canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  display:block;
  pointer-events:none;
}

.ui-layer{
  position:absolute;
  inset:0;
  z-index:20;
  pointer-events:none;
}
.ui-layer .hotspot,
.ui-layer .topbar,
.ui-layer .contact-btn,
.ui-layer a,
.ui-layer button{
  pointer-events:auto;
}

/* ---------- TOP BAR (assets/ui/layout.json → topbar) ---------- */
.topbar{
  position:absolute;
  top:0; left:0; right:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:var(--topbar-pad-y, 18px) var(--topbar-pad-x, 26px);
  padding-top:calc(var(--topbar-pad-y, 18px) + env(safe-area-inset-top, 0px));
  padding-left:calc(var(--topbar-pad-x, 26px) + env(safe-area-inset-left, 0px));
  padding-right:calc(var(--topbar-pad-x, 26px) + env(safe-area-inset-right, 0px));
  pointer-events:none;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  pointer-events:auto;
}
.logo .quill{
  font-size:var(--topbar-quill, 26px);
  transform:rotate(-15deg);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));
}
.logo-text{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:var(--topbar-logo, 19px);
  color:var(--cream);
  letter-spacing:.3px;
  text-shadow:0 2px 8px rgba(14,47,66,.55);
  line-height:1.1;
}
.logo-text span{
  display:block;
  font-family:'Nunito',sans-serif;
  font-weight:700;
  font-size:var(--topbar-logo-sub, 10px);
  letter-spacing:2.5px;
  color:var(--gold);
  text-shadow:none;
}
.contact-bar{
  display:flex;
  gap:10px;
  pointer-events:auto;
}
.contact-btn{
  display:flex;
  align-items:center;
  gap:7px;
  background:rgba(14,47,66,.55);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.25);
  color:var(--cream);
  padding:var(--topbar-btn-pad-y, 9px) var(--topbar-btn-pad-x, 14px);
  border-radius:999px;
  font-weight:700;
  font-size:var(--topbar-btn-font, 13px);
  text-decoration:none;
  transition:transform .15s ease, background .15s ease;
}
.contact-btn:hover{
  background:var(--coral);
  transform:translateY(-2px);
}
.contact-btn .ic{font-size:15px;}
@media(max-width:640px){
  .contact-btn span.label{display:none;}
  .contact-btn{padding:9px 11px;}
}

/* ---------- HERO TITLE (driven by assets/ui/layout.json → title) ---------- */
/* Board PNG sized by layout; box uses aspect-ratio from config. */
.hero-copy{
  position:absolute;
  top:var(--title-top, 2.2%);
  left:var(--title-left, 50%);
  transform:translateX(-50%);
  text-align:center;
  z-index:20;
  width:var(--title-width, 39.6%);
  aspect-ratio:var(--title-ratio, 780 / 228);
  height:auto;
  padding:var(--title-pad-top, 4%) var(--title-pad-x, 12%) var(--title-pad-bottom, 4%);
  background:url('assets/ui/Title%20with%20board.png') center center / 100% 100% no-repeat;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--title-gap, 3px);
  box-sizing:border-box;
  overflow:hidden;
}
/* The replacement title artwork already contains all title text. */
.hero-copy .hero-eyebrow,
.hero-copy .hero-title{
  display:none;
}
.hero-eyebrow{
  font-family:'Nunito',sans-serif;
  font-weight:800;
  font-size:clamp(var(--title-eyebrow-min, 8px), var(--title-eyebrow-vw, 0.72vw), var(--title-eyebrow-max, 11px));
  letter-spacing:var(--title-eyebrow-tracking, 1.5px);
  text-transform:uppercase;
  color:rgba(255,247,230,.95);
  background:transparent;
  display:block;
  padding:0;
  margin:0;
  text-shadow:0 2px 6px rgba(14,47,66,.55);
  max-width:100%;
  line-height:1.2;
  white-space:nowrap;
  transform:translateX(calc(var(--title-eyebrow-offset-x, -40px) + var(--title-text-offset-x, 0px)));
}
.hero-title{
  transform:translateX(var(--title-text-offset-x, 0px));
  font-family:'Fraunces', serif;
  font-weight:900;
  font-size:clamp(var(--title-headline-min, 13px), var(--title-headline-vw, 1.35vw), var(--title-headline-max, 22px));
  color:var(--cream);
  text-shadow:0 2px 0 rgba(107,69,34,.45), 0 6px 12px rgba(14,47,66,.35);
  line-height:1.12;
  max-width:100%;
  margin:0;
  text-wrap:balance;
  white-space:normal;
}
.hero-sub{ display:none; }

/* ---------- HOTSPOTS (ui number + text boards) ---------- */
/* Hotspot is positioned by its circle center (x,y). */
.hotspot{
  position:absolute;
  z-index:25;
  background:none;
  border:none;
  cursor:pointer;
  font-family:inherit;
  /* transform set inline (translate -50%,-50%) — origin is the circle center */
  will-change:left, top;
  /* Medallion size — used to pin the text-board vertex on the circle center. */
  --isle-size:calc(clamp(var(--nb-min, 56px), var(--nb-vw, 6.5vw), var(--nb-max, 84px)) * var(--spot-nb-scale, 1));
}
.hotspot-inner{
  position:relative;
  display:inline-block;
  animation:bob 4.5s ease-in-out infinite;
}
.hotspot .isle{
  position:relative;
  z-index:2;
  /* Size from layout.json → numberBoard × per-hotspot --spot-nb-scale */
  width:var(--isle-size);
  aspect-ratio:var(--nb-ratio, 253 / 250);
  height:auto;
  border-radius:0;
  background-color:transparent;
  background-position:center;
  background-size:contain;
  background-repeat:no-repeat;
  border:none;
  box-shadow:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:0;
  color:transparent;
  backdrop-filter:none;
  transition:transform .2s ease;
  flex-shrink:0;
  filter:drop-shadow(0 4px 8px rgba(14,47,66,.35));
}
.hotspot[data-spot="1"] .isle{ background-image:url('assets/ui/number-board-1.png'); }
.hotspot[data-spot="2"] .isle{ background-image:url('assets/ui/number-board-5.png'); }
.hotspot[data-spot="3"] .isle{ background-image:url('assets/ui/number-board-4.png'); }
.hotspot[data-spot="4"] .isle{ background-image:url('assets/ui/number-board-2.png'); }
.hotspot[data-spot="5"] .isle{ background-image:url('assets/ui/number-board-3.png'); }
.hotspot:hover .isle, .hotspot:focus-visible .isle{
  transform:scale(1.08) translateY(-2px);
  box-shadow:none;
}
.hotspot .badge{
  position:absolute;
  inset:0;
  width:auto; height:auto;
  border-radius:0;
  background:transparent;
  color:var(--cream);
  font-family:'JetBrains Mono', monospace;
  font-weight:700;
  font-size:clamp(var(--nb-badge-min, 11px), var(--nb-badge-vw, 1.25vw), var(--nb-badge-max, 17px));
  display:flex; align-items:center; justify-content:center;
  border:none;
  box-shadow:none;
  text-shadow:0 2px 4px rgba(0,0,0,.45);
  pointer-events:none;
  top:0; left:0;
}
.hotspot .tag{
  /* Desktop: board extends right; circle center sits just inside the wood
     near the top-left (same as original PC look). */
  position:absolute;
  top:50%;
  left:50%;
  right:auto;
  z-index:1;
  --tb-pad-x-pct:6.54%;  /* 34/520 — transparent pad in text-board.png */
  --tb-pad-y-pct:6.8%;   /* 17/250 */
  --tb-pad-r-pct:5.19%;  /* 27/520 */
  transform:translate(-14%, 0);
  /* Size from layout.json → textBoard × per-hotspot --spot-tb-scale */
  width:calc(clamp(var(--tb-min, 120px), var(--tb-vw, 15vw), var(--tb-max, 190px)) * var(--spot-tb-scale, 1));
  aspect-ratio:var(--tb-ratio, 520 / 250);
  height:auto;
  background:url('assets/ui/text-board.png') center / contain no-repeat;
  color:var(--wood-dark);
  font-weight:800;
  font-size:calc(clamp(var(--tb-font-min, 9px), var(--tb-font-vw, 0.95vw), var(--tb-font-max, 12.5px)) * var(--spot-tb-scale, 1));
  line-height:1.15;
  /* extra left padding clears the overlapping circle */
  padding:var(--tb-pad-top, 16%) var(--tb-pad-x, 10%) var(--tb-pad-bottom, 16%) var(--tb-pad-left, 26%);
  border-radius:0;
  box-shadow:none;
  text-align:center;
  max-width:none;
  border:none;
  border-bottom:none;
  display:flex;
  align-items:center;
  justify-content:center;
  box-sizing:border-box;
}
@keyframes bob{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-8px);}
}

.route{
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
}

.footer-tag{
  position:absolute;
  bottom:calc(var(--footer-bottom, 20px) + env(safe-area-inset-bottom, 0px)); left:50%; transform:translateX(-50%);
  z-index:22;
  text-align:center;
  color:var(--cream);
  font-weight:700;
  font-size:var(--footer-font, 12.5px);
  line-height:1.35;
  text-shadow:0 2px 8px rgba(14,47,66,.6);
  width:min(var(--footer-max-px, 560px), var(--footer-max-vw, 90vw));
  padding:0 12px;
  box-sizing:border-box;
  pointer-events:none;
}

/* ---------- SLIDE PANEL (overlays homepage — does not resize the stage) ---------- */
.overlay{
  position:fixed; inset:0;
  background:rgba(14,47,66,.22);
  backdrop-filter:blur(1px);
  opacity:0; pointer-events:none;
  transition:opacity .38s cubic-bezier(.22,.9,.32,1);
  z-index:80;
}
.overlay.open{ opacity:1; pointer-events:auto; }

body.panel-open .stage{
  width:100vw !important;
  width:100dvw !important;
  height:var(--stage-h, 100dvh) !important;
}

.panel{
  position:fixed;
  top:0; right:0;
  width:var(--panel-width);
  max-width:100%;
  height:100%;
  height:100dvh;
  height:var(--stage-h, 100dvh);
  max-height:100dvh;
  max-height:var(--stage-h, 100dvh);
  background:var(--panel-bg);
  box-shadow:-14px 0 40px rgba(14,47,66,.35);
  transform:translateX(100%);
  transition:transform .38s cubic-bezier(.22,.9,.32,1);
  z-index:90;
  overflow-x:hidden;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  padding:26px 24px 60px;
  padding-top:calc(26px + env(safe-area-inset-top, 0px));
  padding-right:calc(24px + env(safe-area-inset-right, 0px));
  padding-bottom:calc(60px + env(safe-area-inset-bottom, 0px));
  padding-left:calc(24px + env(safe-area-inset-left, 0px));
  box-sizing:border-box;
}
.panel.open{ transform:translateX(0); }
.panel::-webkit-scrollbar{width:8px;}
.panel::-webkit-scrollbar-thumb{background:var(--sand-dark); border-radius:8px;}
.panel img,
.panel .casino-hero,
.panel .game-grid,
.panel .casino-cat-row,
.panel .stat-grid,
.panel .chip-grid,
.panel .chip-row{
  max-width:100%;
}
.panel .casino-hero{
  width:100%;
}

.panel-close{
  position:absolute;
  top:18px; right:18px;
  width:34px; height:34px;
  border-radius:50%;
  border:none;
  background:var(--ink);
  color:var(--cream);
  font-size:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.panel-close:hover{ background:var(--coral); }

.panel-eyebrow{
  display:flex; align-items:center; gap:10px;
  margin-bottom:6px;
}
.panel-eyebrow .num{
  width:30px; height:30px;
  border-radius:50%;
  background:var(--coral);
  color:#fff;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:12px;
  display:flex; align-items:center; justify-content:center;
}
.panel-eyebrow .cat{
  font-weight:800;
  font-size:11px;
  letter-spacing:2px;
  color:var(--wood-dark);
  text-transform:uppercase;
}
.panel h2{
  font-family:'Fraunces', serif;
  font-weight:800;
  font-size:26px;
  color:var(--ink);
  margin:2px 0 12px;
  padding-right:30px;
}
/* Reference panel title: bold condensed Impact-like (Anton) + two-tone */
.panel h2.casino-heading{
  font-family:'Anton', Impact, 'Arial Narrow', sans-serif;
  font-weight:400;
  font-size:clamp(34px, 7vw, 46px);
  letter-spacing:.02em;
  line-height:.95;
  text-transform:uppercase;
  margin:4px 0 14px;
}
.panel h2.casino-heading .casino-heading__a{
  color:#0E2F42;
}
.panel h2.casino-heading .casino-heading__b{
  color:#E8A820;
  -webkit-text-stroke:0.5px rgba(14,47,66,.15);
}
.panel p.lead{
  font-size:14.5px;
  line-height:1.6;
  color:#3B5A6B;
  margin-bottom:22px;
}
.panel[data-panel="1"] p.lead{
  font-family:'Anton', Impact, 'Arial Narrow', sans-serif;
  font-weight:400;
  font-size:15px;
  letter-spacing:.02em;
  line-height:1.45;
  margin-bottom:16px;
  text-transform:none;
}
.panel[data-panel="1"] .panel-eyebrow .cat,
.panel[data-panel="1"] .section-label{
  font-family:'Anton', Impact, 'Arial Narrow', sans-serif;
  font-weight:400;
  letter-spacing:.12em;
}
.panel[data-panel="1"] .stat-card .label,
.panel[data-panel="1"] .stat-card .val,
.panel[data-panel="1"] .check-list li,
.panel[data-panel="1"] .cta-btn{
  font-family:'Anton', Impact, 'Arial Narrow', sans-serif;
  font-weight:400;
  letter-spacing:.04em;
}
.panel[data-panel="1"] .check-list li{
  letter-spacing:.02em;
  text-transform:none;
}
.panel[data-panel="1"] .cta-btn{
  letter-spacing:.08em;
  text-transform:uppercase;
}
.section-label{
  font-weight:800;
  font-size:11px;
  letter-spacing:1.6px;
  text-transform:uppercase;
  color:var(--wood-dark);
  margin:22px 0 10px;
  border-bottom:2px dashed var(--sand-dark);
  padding-bottom:6px;
}
.chip-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.chip{
  background:#fff;
  border:1px solid #EFDFB8;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  font-size:11.5px;
  font-weight:700;
  color:var(--ink);
}
.chip .ic{ font-size:22px; display:block; margin-bottom:4px;}

.game-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:12px;
}
.game-card{
  background:linear-gradient(160deg, var(--ink), #1C4A63);
  border-radius:14px;
  padding:12px 10px 14px;
  text-align:center;
  color:var(--cream);
  box-shadow:var(--shadow);
  overflow:hidden;
  min-width:0;
}
.game-card .ic{ font-size:30px; }
.game-card .thumb{
  width:100%;
  aspect-ratio:1 / 1;
  height:auto;
  object-fit:contain;
  object-position:center;
  display:block;
  margin:0 auto;
  border-radius:10px;
  background:rgba(0,0,0,.25);
}
.game-card .name{
  font-family:'Anton', Impact, 'Arial Narrow', sans-serif;
  font-weight:400;
  font-size:14px;
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-top:10px;
  line-height:1.15;
}

/* Casino panel hero — layout: assets/casino/hero.config.json (applied inline by casino-hero.js) */
.casino-hero{
  position:relative;
  width:100%;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.casino-hero__stage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
.casino-hero__bg{

const panel = document.getElementById('panel');
const overlay = document.getElementById('overlay');
const panelContent = document.getElementById('panel-content');

async function openPanel(id){
  const c = content[id];
  let body = c.body;
  if (id === 1 && typeof window.buildCasinoHeroScene === 'function') {
    await (window.casinoHeroReady || Promise.resolve());
    body = window.buildCasinoHeroScene() + body;
  }
  const titleClass = c.titleClass ? ` class="${c.titleClass}"` : '';
  panel.dataset.panel = String(id);
  panelContent.innerHTML = `
    <div class="panel-eyebrow"><div class="num">0${id}</div><div class="cat">${c.cat}</div></div>
    <h2${titleClass}>${c.title}</h2>
    <p class="lead">${c.lead}</p>
    ${body}
  `;
  panel.classList.add('open');
  overlay.classList.add('open');
  document.body.classList.add('panel-open');
  if (id === 1 && typeof window.initCasinoHeroSpin === 'function') {
    requestAnimationFrame(() => window.initCasinoHeroSpin(panelContent));
  }
}
function closePanel(){
  panel.classList.remove('open');
  overlay.classList.remove('open');
  document.body.classList.remove('panel-open');
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePanel(); });

/** Apply ALL UI chrome from assets/ui/layout.json — CSS no longer hardcodes sizes. */
(async function applyUiLayout(){
  try{
    const rawRev = document.querySelector('meta[name="site-rev"]')?.content || '';
    const host = location.hostname;
    const isLocal = host === 'localhost' || host === '127.0.0.1' || host === '[::1]';
    const layoutRev =
      window.__ASSET_BUST__ ||
      (isLocal || rawRev.includes('DEPLOY_REV') ? String(Date.now()) : (rawRev || String(Date.now())));
    const res = await fetch(
      `assets/ui/layout.json?v=${encodeURIComponent(layoutRev)}`,
      { cache: 'no-store', headers: { 'Cache-Control': 'no-cache', Pragma: 'no-cache' } }
    );
    if(!res.ok) return;
    const cfg = await res.json();
    const artW = cfg.uiArtWidth || 1920;
    const artH = cfg.uiArtHeight || 1080;
    const root = document.documentElement;

    const top = cfg.topbar || {};
    const mob = cfg.mobile || {};
    // Same signal as island-scene.js — layout viewport only (ignore pinch-zoom visualViewport).
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const isMobile = Math.abs(vw - vh) < 12
      ? window.matchMedia('(orientation: portrait)').matches
      : vh > vw;
    root.classList.toggle('layout-portrait', isMobile);
    root.classList.toggle('layout-landscape', !isMobile);

    root.style.setProperty('--topbar-pad-y', `${isMobile ? (mob.topbarPadY ?? 10) : (top.paddingY ?? 18)}px`);
    root.style.setProperty('--topbar-pad-x', `${isMobile ? (mob.topbarPadX ?? 12) : (top.paddingX ?? 26)}px`);
    root.style.setProperty('--topbar-logo', `${isMobile ? (mob.logoFontPx ?? 15) : (top.logoFontPx ?? 19)}px`);
    root.style.setProperty('--topbar-logo-sub', `${isMobile ? (mob.logoSubPx ?? 8) : (top.logoSubPx ?? 10)}px`);
    root.style.setProperty('--topbar-quill', `${isMobile ? (mob.quillPx ?? 20) : (top.quillPx ?? 26)}px`);
    root.style.setProperty('--topbar-btn-font', `${top.btnFontPx ?? 13}px`);
    root.style.setProperty('--topbar-btn-pad-y', `${top.btnPadY ?? 9}px`);
    root.style.setProperty('--topbar-btn-pad-x', `${top.btnPadX ?? 14}px`);

    const t = cfg.title || {};
    let scale = t.scale == null ? 1 : Number(t.scale);
    if (isMobile) scale *= mob.titleScale == null ? 0.9 : Number(mob.titleScale);
    const tw = (t.w || 800) * scale;
    // Visible wood height; prefer explicit h from layout.
    const th = t.h || 230;
    const tArtW = t.w || 800;
    const cx = (t.x || 0) + tArtW / 2;
    // CSS % padding is width-based; convert vertical pads from % of board height.
    const titleHOverW = th / tArtW;
    const padTopW = (t.paddingTopPct ?? 14) * titleHOverW;
    const padBottomW = (t.paddingBottomPct ?? 16) * titleHOverW;
    const titleWidthPct = isMobile
      ? (mob.titleWidthPct == null ? 78 : Number(mob.titleWidthPct))
      : (tw / artW) * 100;
    // Mobile: pin the board dead-center (desktop art cx can look off on portrait).
    const titleLeftPct = isMobile ? 50 : (cx / artW) * 100;
    root.style.setProperty('--title-top', `${((t.y || 0) / artH) * 100}%`);
    root.style.setProperty('--title-left', `${titleLeftPct}%`);
    root.style.setProperty('--title-width', `${titleWidthPct}%`);
    root.style.setProperty('--title-ratio', `${tArtW} / ${th}`);
    root.style.setProperty('--title-pad-top', `${padTopW}%`);
    root.style.setProperty('--title-pad-x', `${t.paddingXPct ?? 11}%`);
    root.style.setProperty('--title-pad-bottom', `${padBottomW}%`);
    root.style.setProperty('--title-gap', `${t.gapPx ?? 3}px`);
    if (t.file) {
      const titleEl = document.querySelector('.hero-copy');
      if (titleEl) {
        const titleUrl = t.file.startsWith('assets/') ? t.file : `assets/ui/${t.file}`;
        const escaped = titleUrl.replace(/ /g, '%20');
        titleEl.style.backgroundImage = `url('${escaped}')`;
        root.style.setProperty('--title-img', `url('${escaped}')`);
      }
    }
    const eyebrow = t.eyebrow || {};
    const headline = t.headline || {};
    // Desktop uses a rightward text nudge for the wood grain; on mobile that
    // pushes the title off-center — keep offsets at 0 for portrait.
    const eyebrowOffset = isMobile
      ? (mob.eyebrowOffsetX == null ? 0 : Number(mob.eyebrowOffsetX))
      : (eyebrow.offsetX ?? -40);
    const textOffsetX = isMobile
      ? (mob.textOffsetX == null ? 0 : Number(mob.textOffsetX))
      : (t.textOffsetX ?? 0);
    root.style.setProperty('--title-eyebrow-min', `${eyebrow.minPx ?? 8}px`);
    root.style.setProperty('--title-eyebrow-vw', `${eyebrow.vw ?? 0.72}vw`);
    root.style.setProperty('--title-eyebrow-max', `${isMobile ? (mob.eyebrowMaxPx ?? 8) : (eyebrow.maxPx ?? 11)}px`);
    root.style.setProperty('--title-eyebrow-tracking', `${isMobile ? 0.4 : (eyebrow.letterSpacingPx ?? 1.5)}px`);
    root.style.setProperty('--title-eyebrow-offset-x', `${eyebrowOffset}px`);
    root.style.setProperty('--title-text-offset-x', `${textOffsetX}px`);
    root.style.setProperty('--title-headline-min', `${headline.minPx ?? 13}px`);
    root.style.setProperty('--title-headline-vw', `${headline.vw ?? 1.35}vw`);
    root.style.setProperty('--title-headline-max', `${isMobile ? (mob.headlineMaxPx ?? 16) : (headline.maxPx ?? 22)}px`);

    let nScale = (cfg.numberBoard && cfg.numberBoard.scale != null) ? Number(cfg.numberBoard.scale) : 1;
    let tScale = (cfg.textBoard && cfg.textBoard.scale != null) ? Number(cfg.textBoard.scale) : 1;
    let textFontScale = tScale;
    let badgeFontScale = nScale;
    if (isMobile) {
      nScale *= mob.numberBoardScale == null ? 0.78 : Number(mob.numberBoardScale);
      tScale *= mob.textBoardScale == null ? 0.82 : Number(mob.textBoardScale);
      // Keep label type readable (near title size) — do not crush fonts with board scale.
      textFontScale = mob.textFontScale == null ? 1.15 : Number(mob.textFontScale);
      badgeFontScale = mob.badgeFontScale == null ? 1.1 : Number(mob.badgeFontScale);
    }

    const nb = cfg.numberBoard || {};
    root.style.setProperty('--nb-ratio', `${nb.w || 253} / ${nb.h || 250}`);
    root.style.setProperty('--nb-min', `${(nb.minPx ?? 56) * nScale}px`);
    root.style.setProperty('--nb-vw', `${(nb.widthVw ?? 6.5) * nScale}vw`);
    root.style.setProperty('--nb-max', `${(nb.maxPx ?? 84) * nScale}px`);
    root.style.setProperty('--nb-badge-min', `${(nb.badgeMinPx ?? 11) * badgeFontScale}px`);
    root.style.setProperty('--nb-badge-vw', `${(nb.badgeVw ?? 1.25) * badgeFontScale}vw`);
    root.style.setProperty('--nb-badge-max', `${(nb.badgeMaxPx ?? 17) * badgeFontScale}px`);

    const tb = cfg.textBoard || {};
    root.style.setProperty('--tb-ratio', `${tb.w || 520} / ${tb.h || 250}`);
    root.style.setProperty('--tb-min', `${(tb.minPx ?? 120) * tScale}px`);
    root.style.setProperty('--tb-vw', `${(tb.widthVw ?? 15) * tScale}vw`);
    root.style.setProperty('--tb-max', `${(tb.maxPx ?? 190) * tScale}px`);
    root.style.setProperty('--tb-font-min', `${(tb.fontMinPx ?? 9) * textFontScale}px`);
    root.style.setProperty('--tb-font-vw', `${isMobile ? 3.4 : ((tb.fontVw ?? 0.95) * textFontScale)}vw`);
    root.style.setProperty('--tb-font-max', `${(tb.fontMaxPx ?? 12.5) * textFontScale}px`);
    root.style.setProperty('--tb-pad-top', `${tb.padTopPct ?? 16}%`);
    root.style.setProperty('--tb-pad-x', `${tb.padXPct ?? 10}%`);
    root.style.setProperty('--tb-pad-left', `${tb.padLeftPct ?? 26}%`);
    root.style.setProperty('--tb-pad-bottom', `${tb.padBottomPct ?? 12}%`);

    const spots = cfg.hotspots || {};
    Object.keys(spots).forEach((id) => {
      const el = document.querySelector(`.hotspot[data-spot="${id}"]`);
      if (!el) return;
      const h = spots[id];
      el.style.setProperty('--spot-nb-scale', String(h.numberScale == null ? 1 : h.numberScale));
      el.style.setProperty('--spot-tb-scale', String(h.textScale == null ? 1 : h.textScale));
    });

    const foot = cfg.footer || {};
    root.style.setProperty('--footer-bottom', `${isMobile ? (mob.footerBottomPx ?? 10) : (foot.bottomPx ?? 14)}px`);
    root.style.setProperty('--footer-font', `${isMobile ? (mob.footerFontPx ?? 10) : (foot.fontPx ?? 12.5)}px`);
    root.style.setProperty('--footer-max-px', `${foot.maxWidthPx ?? 420}px`);
    root.style.setProperty('--footer-max-vw', `${isMobile ? (mob.footerMaxVw ?? 94) : (foot.maxWidthVw ?? 86)}vw`);
  }catch(err){
    console.warn('ui layout config failed', err);
  }
})();
</script>
