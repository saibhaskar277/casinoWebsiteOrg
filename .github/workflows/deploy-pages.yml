# Deploy static site to GitHub Pages.
# Works on github.io and any custom domain you attach later in repo Settings → Pages.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          # Copy only what the live site needs (keeps .git / workflows out of the artifact)
          cp index.html island-scene.js _site/
          cp -r assets _site/assets
          # Optional custom domain: put your domain in CNAME (see site.config.json)
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          # Drop unused placeholder island pack from the published bundle if present
          rm -rf _site/assets/island
          rm -f _site/assets/chops_001/_aligned_preview.png \
                "_site/assets/chops_001/web page ref.jpg" \
                _site/assets/chops_001/locate_layers.py \
                _site/assets/chops_001/layout.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
