# Deploy static site to GitHub Pages.
# Works on github.io and any custom domain you attach later in repo Settings → Pages.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp index.html island-scene.js _site/
          cp -r assets _site/assets
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          # Drop reference layouts / tooling if present
          rm -f _site/assets/scene/web-layout.jpg \
                _site/assets/ui/web-layout.jpg

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages + Actions source if the repo has not been configured yet
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
