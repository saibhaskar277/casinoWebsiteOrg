<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Preview — Treasure Island</title>
<style>
  :root{ color-scheme:dark; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:radial-gradient(ellipse at 50% 0%, #12303f 0%, #0a1620 60%, #060d13 100%);
    font-family:'Segoe UI', system-ui, sans-serif;
    color:#cfe3ee;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:12px;
    padding:12px 18px;
    width:100%;
    justify-content:center;
    background:rgba(8,18,26,.7);
    border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:blur(6px);
  }
  .toolbar h1{
    font-size:14px;
    font-weight:700;
    letter-spacing:.5px;
    margin:0 6px 0 0;
    color:#eaf6ff;
  }
  .toolbar label{ font-size:12px; opacity:.75; }
  select, button, a.exit-link{
    font:inherit;
    font-size:13px;
    color:#eaf6ff;
    background:#173040;
    border:1px solid rgba(255,255,255,.18);
    border-radius:8px;
    padding:7px 12px;
    cursor:pointer;
    text-decoration:none;
  }
  select:hover, button:hover, a.exit-link:hover{ background:#1f4257; }
  button.primary{ background:#e2643f; border-color:transparent; font-weight:700; }
  button.primary:hover{ background:#f2764f; }
  button.active{
    background:#2a6a86;
    border-color:rgba(255,255,255,.35);
    font-weight:700;
  }
  .mode-toggle{ display:flex; gap:6px; }
  .dim{
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:12px;
    opacity:.8;
    min-width:96px;
    text-align:center;
  }
  .stage-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 16px 40px;
    width:100%;
  }
  .scaler{ position:relative; }
  .frame{
    position:absolute;
    top:0; left:0;
    transform-origin:top left;
  }
  .frame.phone{
    padding:14px;
    border-radius:44px;
    background:linear-gradient(160deg, #2a2f36, #14171c);
    box-shadow:
      0 0 0 2px #000 inset,
      0 30px 70px rgba(0,0,0,.6),
      0 8px 20px rgba(0,0,0,.5);
  }
  .frame.phone::after{
    content:"";
    position:absolute;
    top:20px; left:50%;
    transform:translateX(-50%);
    width:120px; height:22px;
    background:#0a0d11;
    border-radius:0 0 14px 14px;
    z-index:3;
    pointer-events:none;
  }
  .frame.phone iframe{
    border-radius:30px;
    box-shadow:0 0 0 1px rgba(0,0,0,.5);
  }
  .frame.desktop{
    padding:0;
    border-radius:12px;
    background:#0c1620;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.1),
      0 24px 60px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .frame.desktop iframe{ border-radius:0; box-shadow:none; }
  iframe{
    display:block;
    border:0;
    background:#6ec8ff;
  }
  .hint{
    font-size:12px;
    opacity:.65;
    text-align:center;
    max-width:620px;
    line-height:1.5;
  }
  .hint code{
    background:rgba(255,255,255,.08);
    padding:1px 6px;
    border-radius:5px;
    font-size:11.5px;
  }
  .mobile-only.hidden, .pc-only.hidden{ display:none !important; }
</style>
</head>
<body>
  <div class="toolbar">
    <h1 id="title">🖥️ Dev Preview</h1>
    <div class="mode-toggle">
      <button type="button" id="modePc" class="active">PC</button>
      <button type="button" id="modeMobile">Mobile</button>
    </div>
    <label class="pc-only">Viewport
      <select id="pcSize"></select>
    </label>
    <label class="mobile-only hidden">Device
      <select id="device"></select>
    </label>
    <button id="rotate" class="mobile-only hidden" title="Rotate">⟲ Rotate</button>
    <span class="dim" id="dim">—</span>
    <button id="reload" class="primary" title="Hard-reload layout + art (bypass cache)">↻ Reload</button>
    <a id="exitDev" class="exit-link" href="index.html" title="Open the real full-page site">↗ Normal view</a>
    <span class="hint" id="hint"></span>
  </div>

  <div class="stage-wrap">
    <div class="scaler" id="scaler">
      <div class="frame desktop" id="frame">
        <iframe id="preview" title="Site preview"></iframe>
      </div>
    </div>
  </div>

<script>
  /*
    Dev = same page as Normal, only visually scaled down (CSS transform).
    The iframe keeps a real CSS width/height so layout matches that size.
    Use PC → "This display" to mirror Normal on your monitor.
    Mobile device sizes simulate phones (different scene file).
  */
  const PHONES = [
    // Real Pixel 8 CSS size (412×915). Site uses 100lvh so production matches this.
    { name: 'Pixel 8', w: 412, h: 915 },
    { name: 'Pixel 8 Pro', w: 448, h: 998 },
    { name: 'iPhone 15 / 14 Pro', w: 393, h: 852 },
    { name: 'iPhone SE', w: 375, h: 667 },
    { name: 'Galaxy S20', w: 360, h: 800 },
  ];

  function displaySize() {
    // Same CSS viewport Normal gets in THIS browser window (not the whole monitor).
    // Outer frame scale only shrinks the preview visually — layout stays identical.
    return {
      name: 'Match Normal (this window)',
      w: Math.max(1024, window.innerWidth),
      h: Math.max(640, window.innerHeight),
    };
  }

  const DESKTOPS = [
    displaySize(),
    { name: 'Laptop 1366', w: 1366, h: 768 },
    { name: 'Desktop 1440', w: 1440, h: 900 },
    { name: 'Full HD 1920', w: 1920, h: 1080 },
    { name: 'Art canvas 1920×960', w: 1920, h: 960 },
  ];

  const deviceSel = document.getElementById('device');
  const pcSizeSel = document.getElementById('pcSize');
  const iframe = document.getElementById('preview');
  const frame = document.getElementById('frame');
  const scaler = document.getElementById('scaler');
  const dimEl = document.getElementById('dim');
  const rotateBtn = document.getElementById('rotate');
  const reloadBtn = document.getElementById('reload');
  const modeMobileBtn = document.getElementById('modeMobile');
  const modePcBtn = document.getElementById('modePc');
  const titleEl = document.getElementById('title');
  const hintEl = document.getElementById('hint');
  const exitDev = document.getElementById('exitDev');

  const PHONE_BEZEL = 14;

  let mode = 'pc';
  let currentPhone = PHONES[0];
  let currentDesktop = DESKTOPS[0];
  let landscape = false;

  try {
    sessionStorage.removeItem('ti-dev-viewport');
  } catch (_) { /* ignore */ }

  PHONES.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${d.name} (${d.w}×${d.h})`;
    deviceSel.appendChild(opt);
  });
  DESKTOPS.forEach((d, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = `${d.name} (${d.w}×${d.h})`;
    pcSizeSel.appendChild(opt);
  });

  function currentSize() {
    if (mode === 'mobile') {
      return {
        w: landscape ? currentPhone.h : currentPhone.w,
        h: landscape ? currentPhone.w : currentPhone.h,
      };
    }
    // Refresh "This display" from the live screen each time.
    if (Number(pcSizeSel.value) === 0) {
      currentDesktop = displaySize();
    }
    return { w: currentDesktop.w, h: currentDesktop.h };
  }

  function previewSrc() {
    const { w, h } = currentSize();
    // Portrait phone frame → mobile scene; landscape (even in Mobile mode) → PC scene.
    const useMobile = mode === 'mobile' && h > w;
    const layout = useMobile ? 'mobile=1' : 'desktop=1';
    try {
      sessionStorage.setItem('ti-force-layout', useMobile ? 'mobile' : 'desktop');
    } catch (_) { /* ignore */ }
    return `index.html?dev=1&${layout}&nocache=${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
  }

  async function hardReloadPreview() {
    try {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map((k) => caches.delete(k)));
      }
    } catch (_) { /* ignore */ }
    // Size first, then drop the old document and load a cache-busted URL.
    applySize();
    iframe.src = 'about:blank';
    requestAnimationFrame(() => {
      iframe.src = previewSrc();
    });
  }

  function setMode(next) {
    mode = next;
    const isMobile = mode === 'mobile';
    try {
      sessionStorage.setItem('ti-force-layout', isMobile ? 'mobile' : 'desktop');
    } catch (_) { /* ignore */ }
    modeMobileBtn.classList.toggle('active', isMobile);
    modePcBtn.classList.toggle('active', !isMobile);
    document.querySelectorAll('.mobile-only').forEach((el) => {
      el.classList.toggle('hidden', !isMobile);
    });
    document.querySelectorAll('.pc-only').forEach((el) => {
      el.classList.toggle('hidden', isMobile);
    });
    frame.classList.toggle('phone', isMobile);
    frame.classList.toggle('desktop', !isMobile);
    titleEl.textContent = isMobile ? '📱 Mobile Preview' : '🖥️ PC Preview';
    hintEl.innerHTML = isMobile
      ? 'Separate mobile layout (<code>layout.mobile.json</code>). Tune flags here for phones — independent from PC. Hit Reload after edits.'
      : 'Separate PC layout (<code>layout.json</code>). Match Normal uses this window size. Mobile mode is a different scene.';
    // Size the iframe before navigation so loadConfigs never sees a landscape default.
    applySize();
    iframe.src = previewSrc();
  }

  function applySize() {
    const { w, h } = currentSize();
    const bezel = mode === 'mobile' ? PHONE_BEZEL : 0;

    // Logical CSS size (layout) — NOT affected by the visual scale below.
    iframe.style.width = w + 'px';
    iframe.style.height = h + 'px';

    const outerW = w + bezel * 2;
    const outerH = h + bezel * 2;
    const availW = Math.max(280, window.innerWidth - 48);
    const availH = Math.max(360, window.innerHeight - 150);
    const scale = Math.min(1, availW / outerW, availH / outerH);
    frame.style.transform = `scale(${scale})`;
    frame.style.padding = bezel ? bezel + 'px' : '0';
    scaler.style.width = outerW * scale + 'px';
    scaler.style.height = outerH * scale + 'px';
    dimEl.textContent = `${w}×${h} @ ${Math.round(scale * 100)}%`;
  }

  modeMobileBtn.addEventListener('click', () => setMode('mobile'));
  modePcBtn.addEventListener('click', () => setMode('pc'));

  deviceSel.addEventListener('change', () => {
    currentPhone = PHONES[Number(deviceSel.value)];
    applySize();
  });
  pcSizeSel.addEventListener('change', () => {
    currentDesktop = Number(pcSizeSel.value) === 0
      ? displaySize()
      : DESKTOPS[Number(pcSizeSel.value)];
    applySize();
  });
  rotateBtn.addEventListener('click', () => {
    landscape = !landscape;
    applySize();
    hardReloadPreview();
  });
  reloadBtn.title = 'Hard-reload: clear caches + refetch layout, JS, and art';
  reloadBtn.addEventListener('click', () => {
    hardReloadPreview();
  });
  exitDev.addEventListener('click', () => {
    try {
      sessionStorage.removeItem('ti-dev-viewport');
      sessionStorage.removeItem('ti-force-layout');
    } catch (_) { /* ignore */ }
    exitDev.href = `index.html?nocache=${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
  });
  window.addEventListener('resize', applySize);

  const params = new URLSearchParams(location.search);
  setMode(params.get('mode') === 'mobile' ? 'mobile' : 'pc');
</script>
</body>
</html>
